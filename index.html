<style>
/* =====================================================================
   DBLine v4 — "Sand & Sea"
   Palette tailored to Discovery Bay itself: warm sand background, each
   route wearing its own sea-side identity color (Transit-app style).
   Every press springs. The page is a fixed app shell: no iOS rubber-band.
   ===================================================================== */
:root {
  --sand:      #F6F1E7;
  --sand-deep: #EFE7D8;
  --card:      #FFFFFF;
  --ink:       #46413A;
  --muted:     #8A8175;
  --faint:     #B4AA99;
  --line:      #EFE9DC;
  --red:       #E05252;
  --amber:     #D9922B;
  --green:     #2E9E6B;
  --radius:    20px;
  --spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

/* ---- fixed app shell: kills the drag-the-whole-page-around bounce ---- */
html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
body { position: fixed; inset: 0; width: 100%;
       background: var(--sand); font-family: var(--sans); color: var(--ink); }
#app {
  position: absolute; inset: 0; overflow-y: auto;
  -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain;
  padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
}
#app > .inner { max-width: 560px; margin: 0 auto; }

/* ---------- header ---------- */
header { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 16px; }
.wordmark { font-weight: 800; letter-spacing: -0.02em; font-size: 22px; user-select: none; color: var(--ink); }
.wordmark .x { color: #3B79C4; }
.meta { display: flex; align-items: center; gap: 8px; }
.daychip {
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em; color: var(--muted);
  background: var(--card); border-radius: 999px; padding: 6px 12px;
  box-shadow: 0 1px 4px rgba(70,65,58,0.08);
  font-variant-numeric: tabular-nums;
}
/* ---------- tabs ---------- */
.tabs {
  display: flex; gap: 6px; background: var(--sand-deep); border-radius: 999px;
  padding: 4px; margin: 0 4px 14px;
}
.tab {
  flex: 1; border: none; background: none; color: var(--muted);
  font-family: var(--sans); font-size: 13.5px; font-weight: 700;
  padding: 9px 0; border-radius: 999px; cursor: pointer;
  transition: background 0.25s, color 0.2s, transform 0.25s var(--spring);
}
.tab:active { transform: scale(0.96); }
.tab.active { background: var(--card); color: var(--ink);
              box-shadow: 0 1px 4px rgba(70,65,58,0.10); }

/* ---------- empty state ---------- */
.empty {
  background: var(--card); border-radius: var(--radius);
  padding: 34px 24px; text-align: center;
  box-shadow: 0 2px 12px rgba(70,65,58,0.08);
}
.empty .big { font-size: 34px; margin-bottom: 10px; }
.empty p { font-size: 14.5px; font-weight: 600; color: var(--muted); line-height: 1.55; }
.empty button {
  margin-top: 16px; border: none; background: var(--ink); color: #fff;
  font-family: var(--sans); font-weight: 700; font-size: 13.5px;
  padding: 11px 20px; border-radius: 999px; cursor: pointer;
  transition: transform 0.25s var(--spring);
}
.empty button:active { transform: scale(0.95); }

/* ---------- pin star on cards ---------- */
.pinbtn {
  border: none; background: none; font-size: 20px; cursor: pointer;
  color: #DCD5C7; padding: 4px 6px; line-height: 1;
  transition: transform 0.3s var(--spring), color 0.15s;
}
.pinbtn.active { color: var(--amber); }
.pinbtn:active { transform: scale(1.3) rotate(20deg); }

/* ---------- route cards ---------- */
main { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 15px 16px 14px;
  box-shadow: 0 2px 12px rgba(70,65,58,0.08);
  border-top: 4px solid var(--pair, var(--faint));
  transition: transform 0.25s var(--spring);
}
.card:active { transform: scale(0.985); }
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pair-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
  color: #fff; background: var(--pair); border-radius: 999px; padding: 5px 11px;
}
.pin { font-size: 10px; }
.swap {
  border: none; background: color-mix(in srgb, var(--pair) 12%, white);
  color: var(--pair); border-radius: 999px; width: 42px; height: 34px;
  font-size: 16px; font-weight: 800; cursor: pointer; line-height: 1;
  transition: transform 0.45s var(--spring), background 0.2s;
}
.swap:active { background: color-mix(in srgb, var(--pair) 24%, white); }
.dir-label { font-size: 17.5px; font-weight: 700; margin-top: 9px; letter-spacing: -0.01em; }

.board { display: flex; align-items: baseline; gap: 12px; margin-top: 7px; flex-wrap: wrap; }
.dep-time {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 44px; font-weight: 700; line-height: 1; color: var(--ink);
  transition: color 0.4s;
}
.countdown {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 17px; font-weight: 700; color: var(--muted); transition: color 0.4s;
}
.countdown.urgent { animation: breathe 1.1s ease-in-out infinite; }
@keyframes breathe { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
@media (prefers-reduced-motion: reduce) {
  .countdown.urgent { animation: none; }
  .card, .swap, .tab, .pinbtn, .caret, .sched { transition: none !important; }
}
.then { margin-top: 7px; font-size: 13.5px; color: var(--muted);
        font-family: var(--mono); font-variant-numeric: tabular-nums; }
.then b { font-family: var(--sans); font-weight: 600; color: var(--faint); }
.done-note { font-size: 14.5px; color: var(--muted); margin-top: 9px; }
.done-note span { color: var(--faint); }

.card { cursor: pointer; }
.caret {
  display: inline-block; margin-left: 7px; font-size: 12px; color: var(--faint);
  transition: transform 0.35s var(--spring);
}
.card.open .caret { transform: rotate(180deg); }

/* animated full-schedule drawer */
.sched { display: grid; grid-template-rows: 0fr;
         transition: grid-template-rows 0.4s var(--spring); }
.sched-clip { overflow: hidden; min-height: 0; }
.card.open .sched { grid-template-rows: 1fr; }
.sched-inner { margin-top: 12px; border-top: 1px solid var(--line); padding-top: 11px; }
.sched-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
               text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
.day-tabs { display: flex; gap: 6px; overflow-x: auto;
            -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  font: inherit; letter-spacing: inherit; text-transform: inherit;
  color: var(--faint); background: transparent; border: none;
  border-radius: 999px; padding: 3px 9px; cursor: pointer;
  flex: 0 0 auto; white-space: nowrap;
}
.day-tab .ph { font-size: 8.5px; opacity: 0.8; margin-left: 2px; }
.day-tab.active { background: var(--pair); color: #fff; }
.mchip .tag { font-size: 8px; font-weight: 800; vertical-align: super;
              margin-left: 1px; opacity: 0.85; }
.sched-note { font-size: 10.5px; color: var(--faint); margin-top: 8px;
              line-height: 1.4; }
.sched-note sup { font-weight: 800; }
.sched-list {
  position: relative;              /* correct origin for scroll-to-now math */
  max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  border-radius: 14px; background: var(--sand); padding: 6px 10px;
}
.hrow { display: flex; align-items: flex-start; gap: 10px; padding: 4px 0; }
.hrow.allpast { opacity: 0.45; }
.hlabel {
  flex: 0 0 26px; font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 13px; font-weight: 700; color: var(--muted); padding-top: 5px;
}
.mins { display: flex; flex-wrap: wrap; gap: 5px; }
.mchip {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 13px; font-weight: 600; color: var(--ink);
  background: #fff; border-radius: 8px; padding: 4px 8px;
  box-shadow: 0 1px 2px rgba(70,65,58,0.06);
}
.mchip.past { color: var(--faint); background: transparent; box-shadow: none; }
.mchip.next { background: var(--pair); color: #fff; font-weight: 800; }
.mchip.next .in { font-weight: 700; opacity: 0.85; margin-left: 5px; font-size: 11px; }

/* ---------- settings ---------- */
button:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }

/* ---------- splash (cold launch only) ---------- */
#splash {
  position: fixed; inset: 0; z-index: 50; background: var(--sand);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 26px;
}
#splash.leaving { animation: splashOut 0.45s cubic-bezier(0.55, 0, 0.55, 0.2) forwards; }
@keyframes splashOut {
  to { opacity: 0; transform: translateY(-4%) scale(1.02); }
}
.splash-word { display: flex; font-weight: 800; font-size: 34px;
               letter-spacing: -0.02em; color: var(--ink); }
.splash-word .l { opacity: 0; transform: translateY(18px);
                  animation: letterIn 0.45s var(--spring) forwards; }
.splash-word .l.x { color: #3B79C4; }
@keyframes letterIn { to { opacity: 1; transform: translateY(0); } }
.splash-track { position: relative; width: min(62vw, 250px); height: 8px;
                border-radius: 999px; background: var(--sand-deep); overflow: hidden; }
.splash-track .veh {
  position: absolute; top: 0; height: 8px; width: 34%; border-radius: 999px;
  left: -40%; animation: sweep 0.75s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes sweep { to { left: 106%; } }
.splash-quote {
  max-width: 300px; text-align: center; opacity: 0;
  animation: letterIn 0.5s var(--spring) 0.75s forwards;
}
.splash-quote .q { font-size: 15.5px; font-weight: 600; color: var(--ink);
                   font-style: italic; line-height: 1.45; }
.splash-quote .who { display: block; margin-top: 7px; font-size: 12px;
                     font-weight: 700; color: var(--faint); font-style: normal;
                     letter-spacing: 0.03em; }
.splash-hint {
  position: absolute; bottom: calc(env(safe-area-inset-bottom) + 44px);
  font-size: 12px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--faint);
  opacity: 0; animation: hintPulse 1.8s ease-in-out 1.1s infinite;
}
@keyframes hintPulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.9; } }
@media (prefers-reduced-motion: reduce) { #splash { display: none; } }

/* ---------- version badge ---------- */
#version {
  position: fixed; right: calc(env(safe-area-inset-right) + 12px);
  bottom: calc(env(safe-area-inset-bottom) + 10px);
  font-family: var(--mono); font-size: 10px; font-weight: 600;
  color: var(--faint); opacity: 0.75; z-index: 40;
  pointer-events: none; user-select: none;
}
</style>
</head>

  // minutes entries are numbers, or {m, tag} for annotated trips
  const h = String(hour).padStart(2, "0");

    const min = typeof m === "object" ? m.m : m;
    const tag = typeof m === "object" ? m.tag : null;
    return { time: `${h}:${String(min).padStart(2, "0")}`, marker: null, tag };
  });
}

const HOLIDAYS_BUNDLED = [
  "20260101","20260217","20260218","20260219","20260403","20260404",
  "20260406","20260407","20260501","20260525","20260619","20260701",
  "20260926","20261001","20261019","20261225","20261226",

  "20270916","20271001","20271008","20271225","20271227",
];
const PH_URL = "https://www.1823.gov.hk/common/ical/en.json";
// One-time migration across the app's former names (ExpressDB, D'Bayline):
// carry pins and the cached holiday list to the current keys, newest source wins.
try {
  [[["dbayline.prefs.v1", "expressdb.prefs.v2"], "dbline.prefs.v1"],
   [["dbayline.ph",       "expressdb.ph"],       "dbline.ph"]].forEach(([sources, target]) => {
    sources.forEach(o => {                       // newest-first; first hit wins
      const v = localStorage.getItem(o);
      if (v !== null && localStorage.getItem(target) === null) localStorage.setItem(target, v);
      localStorage.removeItem(o);
    });
  });
} catch (e) {}

const PH_KEY = "dbline.ph";
const PH_TTL = 7 * 24 * 60 * 60 * 1000;
let holidaySet = new Set(HOLIDAYS_BUNDLED);
let phSource = "bundled list";

function loadHolidayCache() {
  try {
    const cache = JSON.parse(localStorage.getItem(PH_KEY));
    if (cache && Array.isArray(cache.dates) && cache.dates.length) {
      cache.dates.forEach(d => holidaySet.add(d));
      phSource = "1823 live feed (cached " + new Date(cache.fetchedAt).toLocaleDateString() + ")";
      return cache;
    }
  } catch (e) {}
  return null;
}
async function refreshHolidays() {
  const cache = loadHolidayCache();
  const age = cache ? Date.now() - (cache.fetchedAt || 0) : Infinity;
  if (age <= PH_TTL) return;
  try {
    const res = await fetch(PH_URL, { mode: "cors" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const dates = data.vcalendar[0].vevent.map(e => e.dtstart[0]);
    dates.forEach(d => holidaySet.add(d));
    localStorage.setItem(PH_KEY, JSON.stringify({ fetchedAt: Date.now(), dates }));
    phSource = "1823 live feed (updated today)";
  } catch (e) { /* bundled data keeps working */ }
}

// ---------- day-type + marker logic ----------
function ymd(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
function sheetFor(d) {
  if (holidaySet.has(ymd(d))) return "sunPh";
  const dow = d.getDay();
  return dow === 0 ? "sunPh" : dow === 6 ? "saturday" : "weekday";
}
// minute -> tag for the given route on the given date, honouring markers
function tagMapFor(routeId, d) {
  const map = new Map();
  const sheet = TIMETABLES[routeId][sheetFor(d)];
  for (const e of sheet) {
    if (e.tag && markerApplies(e.marker, d)) {
      const [h, m] = e.time.split(":").map(Number);
      map.set(h * 60 + m, e.tag);
    }
  }
  return map;
}
function tagLegendHtml(routeId, tmap) {
  const notes = TIMETABLES[routeId].tagNotes;
  if (!notes || tmap.size === 0) return "";
  const used = [...new Set(tmap.values())].filter(t => notes[t]);
  if (!used.length) return "";
  return used.map(t =>
    `<div class="sched-note"><sup>${t}</sup> ${notes[t]}</div>`).join("");
}
function markerApplies(marker, d) {
  if (!marker) return true;
  const dow = d.getDay();
  const yest = new Date(d); yest.setDate(yest.getDate() - 1);
  const yestPH = holidaySet.has(ymd(yest));
  if (marker === "*") return dow === 0 || dow === 1 || yestPH;
  if (marker === "^") return !yestPH && dow >= 2 && dow <= 6;
  return false;
}
function toMin(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function fmt(min) { return String(Math.floor(min/60)).padStart(2,"0") + ":" + String(min%60).padStart(2,"0"); }
function dayDepartures(routeId, d) {
  return TIMETABLES[routeId][sheetFor(d)]
    .filter(e => markerApplies(e.marker, d)).map(e => toMin(e.time));
}
function nextInfo(routeId, now) {
  const nowMin = now.getHours()*60 + now.getMinutes();
  const all = dayDepartures(routeId, now);
  const upcoming = all.filter(m => m >= nowMin);
  if (upcoming.length) return { when: "today", deps: upcoming, all, nowMin };
  const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
  return { when: "tomorrow", deps: dayDepartures(routeId, tmr).slice(0,1), all, nowMin };
}

// ---------- preferences ----------
const PREF_KEY = "dbline.prefs.v1";
let prefs;
function loadPrefs() {
  try { prefs = JSON.parse(localStorage.getItem(PREF_KEY)) || {}; } catch (e) { prefs = {}; }
  PAIRS.forEach(p => {
    if (!prefs[p.id]) prefs[p.id] = { pinned: false, dirIndex: 0 };
    // Always open showing the outbound-from-DB direction; ⇄ swaps last
    // for the session only.
    prefs[p.id].dirIndex = 0;
  });
}
function savePrefs() { localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }
let activeTab = "usuals";   // app always opens on Usuals
const viewDay = {};         // pairId -> day offset 0..6; 0/undefined = today
function orderedPairs() {
  if (activeTab === "usuals") return PAIRS.filter(p => prefs[p.id].pinned);
  return PAIRS;               // All Routes: natural order, stars show pin state
}

// ---------- rendering ----------
const RED_MAX = 3, AMBER_MAX = 8;
function colorFor(mins) {
  return mins <= RED_MAX ? "var(--red)" : mins <= AMBER_MAX ? "var(--amber)" : "var(--green)";
}

const cardsEl = document.getElementById("cards");
const cardRefs = {};   // pairId -> { root, dirLabel, depTime, countdown, then, done, schedList, lastKey }
const openCards = new Set();

function buildCards() {
  cardsEl.innerHTML = "";
  Object.keys(cardRefs).forEach(k => delete cardRefs[k]);
  const pairs = orderedPairs();

  if (activeTab === "usuals" && pairs.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = `<div class="big">\u2B50</div>
      <p>Nothing pinned yet!<br>Head to <b>All Routes</b> and star your usual rides — they'll live here.</p>
      <button id="goAll">Browse All Routes</button>`;
    empty.querySelector("#goAll").addEventListener("click", () => switchTab("all"));
    cardsEl.appendChild(empty);
    return;
  }

  pairs.forEach(pair => {
    const card = document.createElement("article");
    card.className = "card";
    card.style.setProperty("--pair", pair.color);
    card.innerHTML = `
      <div class="card-top">
        <span class="pair-badge">${pair.icon} ${pair.name}</span>
        <span>
          <button class="pinbtn ${prefs[pair.id].pinned ? "active" : ""}" aria-label="Pin to Usuals">★</button>
          <button class="swap" aria-label="Switch direction">⇄</button>
        </span>
      </div>
      <div class="dir-label"><span class="dl-text"></span><span class="caret">\u25BE</span></div>
      <div class="board"><span class="dep-time">--:--</span><span class="countdown"></span></div>
      <div class="then"></div>
      <div class="done-note" style="display:none"></div>
      <div class="sched"><div class="sched-clip"><div class="sched-inner">
        <div class="sched-title day-tabs"></div>
        <div class="sched-list"></div>
      </div></div></div>`;
    const refs = {
      root: card,
      dirLabel: card.querySelector(".dl-text"),
      board: card.querySelector(".board"),
      depTime: card.querySelector(".dep-time"),
      countdown: card.querySelector(".countdown"),
      then: card.querySelector(".then"),
      done: card.querySelector(".done-note"),
      schedList: card.querySelector(".sched-list"),
      lastKey: "",
    };
    const swapBtn = card.querySelector(".swap");
    let swapRot = 0;
    swapBtn.addEventListener("click", () => {
      swapRot += 180;
      swapBtn.style.transform = `rotate(${swapRot}deg)`;
      sfx("swap");
      prefs[pair.id].dirIndex = 1 - prefs[pair.id].dirIndex;
      savePrefs();
      refs.lastKey = "";           // force full refresh incl. schedule list
      tick(true);
      if (openCards.has(pair.id) && !viewDay[pair.id])
        setTimeout(() => scrollScheduleToNow(pair.id, true), 60);
    });
    card.addEventListener("click", (e) => {
      if (e.target.closest(".swap")) return;        // swapping isn't toggling
      if (e.target.closest(".pinbtn")) return;      // pinning isn't toggling either
      if (e.target.closest(".sched-list")) return;  // scrolling the list isn't toggling
      const dayBtn = e.target.closest(".day-tab");
      if (dayBtn) {
        sfx("toggle");
        viewDay[pair.id] = Number(dayBtn.dataset.offset);
        buildSchedule(pair.id);
        if (viewDay[pair.id] === 0) scrollScheduleToNow(pair.id, true);
        else refs.schedList.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }
      if (openCards.has(pair.id)) { openCards.delete(pair.id); card.classList.remove("open"); sfx("close"); return; }
      openCards.add(pair.id); card.classList.add("open");
      sfx("open");
      viewDay[pair.id] = 0;           // drawer always opens on today
      buildSchedule(pair.id);
      // let the drawer spring open, then glide the list to "now"
      setTimeout(() => scrollScheduleToNow(pair.id, true), 320);
    });
    const pinBtn = card.querySelector(".pinbtn");
    pinBtn.addEventListener("click", () => {
      sfx("toggle");
      prefs[pair.id].pinned = !prefs[pair.id].pinned;
      savePrefs();
      pinBtn.classList.toggle("active", prefs[pair.id].pinned);
      // Unpinning while on Usuals removes the card from this view.
      if (activeTab === "usuals" && !prefs[pair.id].pinned) {
        openCards.delete(pair.id);
        buildCards(); tick(true);
      }
    });

    cardsEl.appendChild(card);
    cardRefs[pair.id] = refs;
  });
}

// ---------- tabs ----------
function switchTab(tab) {
  if (tab === activeTab) return;
  activeTab = tab;
  sfx(tab === "all" ? "open" : "close");
  document.querySelectorAll(".tab").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  openCards.clear();
  buildCards(); tick(true);
}
document.querySelectorAll(".tab").forEach(b =>
  b.addEventListener("click", () => switchTab(b.dataset.tab)));

function buildSchedule(pairId) {
  const pair = PAIRS.find(p => p.id === pairId);
  const refs = cardRefs[pairId];
  const routeId = pair.dirs[prefs[pairId].dirIndex];
  const now = new Date();
  const offset = viewDay[pairId] || 0;

  // Chips: today + the next six real dates. Public holidays get a tag,
  // so users never need to know which sheet a date maps to.
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  refs.root.querySelector(".day-tabs").innerHTML =
    Array.from({ length: 7 }, (_, i) => {
      const d = new Date(now); d.setDate(d.getDate() + i);
      const ph = holidaySet.has(ymd(d)) ? '<span class="ph">PH</span>' : "";
      const label = i === 0 ? "Today" : DAY_NAMES[d.getDay()] + " " + d.getDate();
      return `<button class="day-tab${i === offset ? " active" : ""}" data-offset="${i}">${label}${ph}</button>`;
    }).join("");

  const shown = new Date(now); shown.setDate(shown.getDate() + offset);
  const tmap = tagMapFor(routeId, shown);
  const sup = m => tmap.has(m) ? `<sup class="tag">${tmap.get(m)}</sup>` : "";
  const legend = tagLegendHtml(routeId, tmap);

  if (offset !== 0) {
    // Future day: full list, no past-dimming or "next" highlight
    // (those only mean anything today).
    const all = dayDepartures(routeId, shown);
    const hours = new Map();
    all.forEach(m => {
      const h = Math.floor(m / 60);
      if (!hours.has(h)) hours.set(h, []);
      hours.get(h).push(m);
    });
    refs.schedList.innerHTML = [...hours.entries()].map(([h, mins]) => {
      const chips = mins.map(m =>
        `<span class="mchip">:${String(m % 60).padStart(2, "0")}${sup(m)}</span>`).join("");
      return `<div class="hrow" data-hour="${h}">
        <span class="hlabel">${String(h).padStart(2, "0")}</span>
        <div class="mins">${chips}</div>
      </div>`;
    }).join("") || '<div class="hrow"><span class="hlabel">—</span><div class="mins"><span class="mchip past">no service</span></div></div>';
    refs.schedList.innerHTML += legend;
    return;
  }

  const info = nextInfo(routeId, now);
  const nextMin = info.when === "today" ? info.deps[0] : null;

  // Group by hour: one row per hour, minutes as chips.
  const hours = new Map();
  info.all.forEach(m => {
    const h = Math.floor(m / 60);
    if (!hours.has(h)) hours.set(h, []);
    hours.get(h).push(m);
  });

  refs.schedList.innerHTML = [...hours.entries()].map(([h, mins]) => {
    const allPast = mins.every(m => m < info.nowMin) && nextMin !== null;
    const chips = mins.map(m => {
      if (m === nextMin) {
        return `<span class="mchip next">:${String(m % 60).padStart(2, "0")}${sup(m)}<span class="in">${m - info.nowMin}m</span></span>`;
      }
      const cls = m < info.nowMin ? "mchip past" : "mchip";
      return `<span class="${cls}">:${String(m % 60).padStart(2, "0")}${sup(m)}</span>`;
    }).join("");
    return `<div class="hrow${allPast ? " allpast" : ""}" data-hour="${h}">
      <span class="hlabel">${String(h).padStart(2, "0")}</span>
      <div class="mins">${chips}</div>
    </div>`;
  }).join("") || '<div class="hrow"><span class="hlabel">—</span><div class="mins"><span class="mchip past">nothing today</span></div></div>';
  refs.schedList.innerHTML += legend;
}

function scrollScheduleToNow(pairId, smooth) {
  const refs = cardRefs[pairId];
  const container = refs.schedList;
  const chip = container.querySelector(".mchip.next");
  const row = chip ? chip.closest(".hrow") : container.querySelector(".hrow:last-child");
  if (!row) return;
  // container is position:relative, so offsetTop is measured from the list itself
  const top = row.offsetTop - container.clientHeight / 2 + row.clientHeight / 2;
  container.scrollTo({ top: Math.max(0, Math.min(top, container.scrollHeight - container.clientHeight)),
                       behavior: smooth ? "smooth" : "auto" });
}

function tick(force) {
  const now = new Date();
  const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  document.getElementById("clock").textContent =
    [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,"0")).join(":");
  const isPH = holidaySet.has(ymd(now)) && now.getDay() !== 0;
  document.getElementById("daychip").textContent =
    now.toLocaleDateString("en-GB", { weekday: "long", month: "long", day: "numeric" }) +
    (isPH ? " · PH" : "");

  orderedPairs().forEach(pair => {
    const refs = cardRefs[pair.id];
    if (!refs) return;
    const routeId = pair.dirs[prefs[pair.id].dirIndex];
    const route = TIMETABLES[routeId];
    const info = nextInfo(routeId, now);
    refs.dirLabel.textContent = route.label;

    if (info.when === "today") {
      const next = info.deps[0];
      const minsAway = next - Math.floor(nowSec/60);
      const secsLeft = Math.max(0, next*60 - nowSec);
      refs.board.style.display = "";
      refs.done.style.display = "none";
      refs.depTime.textContent = fmt(next);
      refs.depTime.style.color = minsAway <= AMBER_MAX ? colorFor(minsAway) : "var(--ink)";
      refs.countdown.textContent = secsLeft === 0 ? "due now"
        : "in " + Math.floor(secsLeft/60) + ":" + String(secsLeft%60).padStart(2,"0");
      refs.countdown.style.color = colorFor(minsAway);
      refs.countdown.classList.toggle("urgent", minsAway <= RED_MAX);
      refs.then.textContent = "";
      const upcoming = info.deps.slice(1,3).map(fmt);
      refs.then.innerHTML = upcoming.length
        ? `<b>then</b>  ${upcoming.join("  ·  ")}` : `<b>last one today</b>`;
      // refresh schedule list only when the next departure changes
      const key = routeId + ":" + next;
      if (openCards.has(pair.id) && (key !== refs.lastKey || force)) {
        buildSchedule(pair.id);
      }
      refs.lastKey = key;
    } else {
      refs.board.style.display = "none";
      refs.done.style.display = "";
      refs.done.innerHTML = `Done for today 🌙 <span>· first tomorrow ${info.deps.length ? fmt(info.deps[0]) : "—"}</span>`;
      const key = routeId + ":done";
      if (openCards.has(pair.id) && (key !== refs.lastKey || force)) buildSchedule(pair.id);
      refs.lastKey = key;
    }
  });
}

// ---------- sound effects ----------
let _actx = null;
function sfx(kind) {
  try {
    _actx = _actx || new (window.AudioContext || window.webkitAudioContext)();
    if (_actx.state === "suspended") _actx.resume();
    const t = _actx.currentTime;
    const master = _actx.createGain();
    master.gain.value = 0.10;
    master.connect(_actx.destination);
    function blip(freqA, freqB, at, dur, vol) {
      const o = _actx.createOscillator(), g = _actx.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(freqA, t + at);
      o.frequency.exponentialRampToValueAtTime(freqB, t + at + dur);
      g.gain.setValueAtTime(0.0001, t + at);
      g.gain.exponentialRampToValueAtTime(vol, t + at + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + at + dur);
      o.connect(g); g.connect(master);
      o.start(t + at); o.stop(t + at + dur + 0.03);
    }
    if (kind === "open")   blip(520, 880, 0, 0.10, 1);
    if (kind === "close")  blip(700, 420, 0, 0.09, 0.9);
    if (kind === "swap") { blip(600, 900, 0, 0.07, 0.9); blip(900, 600, 0.07, 0.07, 0.9); }
    if (kind === "toggle") blip(950, 950, 0, 0.045, 0.8);
  } catch (e) { /* silence is acceptable */ }
}

// ---------- splash: cold launch only, tap to enter ----------
// FAILSAFE RULE: the splash is decoration. If ANY part of it fails, it
// removes itself rather than trapping the user on the overlay.
(function splash() {
  const el = document.getElementById("splash");
  if (!el) return;
  function dismiss() { try { el.remove(); } catch (e) {} }
  try {
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
    let seen = false;
    try { seen = sessionStorage.getItem("dbline.splashed") === "1"; } catch (e) {}
    if (seen || reduced) { dismiss(); return; }
    try { sessionStorage.setItem("dbline.splashed", "1"); } catch (e) {}

    // Tap handler attaches FIRST: even if decorating below fails,
    // a tap always gets you in.
    let entered = false;
    el.addEventListener("pointerdown", () => {
      if (entered) return;
      entered = true;
      sfx("open");
      el.classList.add("leaving");
      setTimeout(dismiss, 500);
    });
    // Absolute backstop: nobody stays on the splash past 8 seconds.
    setTimeout(() => { if (!entered) dismiss(); }, 8000);

    const word = document.getElementById("splashWord");
    "DBLINE".split("").forEach((ch, i) => {
      const s = document.createElement("span");
      s.className = "l" + (i <= 1 ? " x" : "");
      s.textContent = ch;
      s.style.animationDelay = (0.05 + i * 0.045) + "s";
      word.appendChild(s);
    });

    const QUOTES = [
      { q: "\u201Cfinally a decent app \uD83D\uDE44\u201D", who: "\u2014 Dr Pete Membrey, CRO" },
      { q: "\u201Ctransport has never been easier\u201D", who: "\u2014 Kaydyn, Founder & Everything Else" },
      { q: "\u201Cmy son is amazing\u201D", who: "\u2014 Sarah Membrey, definitely unbiased" },
      { q: "\u201Cthe DBCP app could never\u201D", who: "\u2014 A Discovery Bay resident, allegedly" },
      { q: "\u201Csqueak.\u201D", who: "\u2014 Seneca, Chief Rodent Officer" },
      { q: "\u201Ci was told there would be buses\u201D", who: "\u2014 Xandyr, tough critic" },
      { q: "\u201Cfive stars. would tap again.\u201D", who: "\u2014 The App Store review we don\u2019t have yet" },
    ];
    const pick = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    document.getElementById("splashQuote").innerHTML =
      `<span class="q">${pick.q}</span><span class="who">${pick.who}</span>`;
  } catch (e) {
    dismiss();   // decoration failed -> get out of the way immediately
  }
})();

// ---------- boot ----------
document.getElementById("version").textContent = "v" + APP_VERSION;
loadPrefs();
loadHolidayCache();
buildCards();
tick(true);
setInterval(() => tick(false), 1000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(true); });
refreshHolidays();
</script>
</div></div>
