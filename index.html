<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ExpressDB — DB bus &amp; ferry times, instantly</title>
<meta name="description" content="Next C4, DB03R and Central ferry departures for Discovery Bay. Tap the icon, see your ride.">
<meta name="theme-color" content="#DFF0F6">
<link rel="apple-touch-icon" href="./icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ExpressDB">
<style>
/* =====================================================================
   ExpressDB v2 — seaside light
   Discovery Bay's own vibe: soft sky blue, white cards, sea-glass teal.
   Urgency colors appear only on the countdown, where they earn it.
   ===================================================================== */
:root {
  --bg-top:    #DFF0F6;
  --bg-bottom: #F3FAFC;
  --card:      #FFFFFF;
  --line:      #E2EEF3;
  --ink:       #1F3A46;
  --muted:     #5E7987;
  --faint:     #93AAB6;
  --teal:      #2E9BB5;
  --teal-soft: #E3F2F7;
  --red:       #E15656;
  --amber:     #DE9A2E;
  --green:     #2FA875;
  --radius:    18px;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 240px);
  color: var(--ink);
  font-family: var(--sans);
  padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 28px);
  max-width: 560px;
  margin: 0 auto;
}

/* ---------- header ---------- */
header { display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px 16px; }
.wordmark { font-weight: 800; letter-spacing: -0.02em; font-size: 22px; color: var(--teal); user-select: none; }
.wordmark .db { color: var(--ink); }
.meta { text-align: right; }
.daychip {
  display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.07em;
  color: var(--teal); background: var(--card);
  border-radius: 999px; padding: 4px 11px; margin-bottom: 4px;
  box-shadow: 0 1px 4px rgba(31,58,70,0.08);
}
.clock { font-family: var(--mono); font-variant-numeric: tabular-nums; font-size: 12px; color: var(--muted); }

/* ---------- route cards ---------- */
main { display: flex; flex-direction: column; gap: 12px; }
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 15px 16px 14px;
  box-shadow: 0 2px 10px rgba(31,58,70,0.07);
}
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pair-name {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--faint);
}
.pin { color: var(--amber); font-size: 11px; margin-left: 4px; }
.swap {
  border: none; background: var(--teal-soft); color: var(--teal);
  border-radius: 999px; padding: 7px 13px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); line-height: 1;
}
.swap:active { transform: scale(0.95); }
.dir-label { font-size: 17px; font-weight: 700; margin-top: 7px; }

.board { display: flex; align-items: baseline; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
.dep-time {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 42px; font-weight: 700; line-height: 1; color: var(--ink);
}
.countdown {
  font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 17px; font-weight: 700; color: var(--muted);
}
.then { margin-top: 7px; font-size: 13.5px; color: var(--muted);
        font-family: var(--mono); font-variant-numeric: tabular-nums; }
.then b { font-family: var(--sans); font-weight: 600; color: var(--faint); }
.done-note { font-size: 14.5px; color: var(--muted); margin-top: 8px; }
.done-note span { color: var(--faint); }

.expand-btn {
  margin-top: 11px; width: 100%; border: none; background: var(--teal-soft);
  color: var(--teal); font-weight: 700; font-size: 13px; font-family: var(--sans);
  padding: 9px; border-radius: 11px; cursor: pointer;
}

/* full-schedule drawer */
.sched { display: none; margin-top: 12px; border-top: 1px solid var(--line); padding-top: 11px; }
.card.open .sched { display: block; }
.sched-title { font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
               text-transform: uppercase; color: var(--faint); margin-bottom: 8px; }
.sched-list {
  max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch;
  border-radius: 12px; background: #F7FBFD; padding: 4px 0;
}
.srow {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; font-family: var(--mono); font-variant-numeric: tabular-nums;
  font-size: 15px; color: var(--ink);
}
.srow .away { font-size: 12px; color: var(--faint); }
.srow.past { color: var(--faint); }
.srow.past .away { visibility: hidden; }
.srow.next {
  background: var(--teal-soft); border-radius: 10px; margin: 0 6px;
  padding-left: 8px; padding-right: 8px; color: var(--teal); font-weight: 700;
}
.srow.next .away { color: var(--teal); font-weight: 700; }

/* ---------- footer / settings ---------- */
footer { margin-top: 20px; display: flex; justify-content: space-between; align-items: center;
         font-size: 11px; color: var(--faint); padding: 0 4px; }
footer button {
  background: var(--card); border: none; color: var(--muted); border-radius: 999px;
  padding: 8px 16px; font-size: 12.5px; font-weight: 700; font-family: var(--sans);
  cursor: pointer; box-shadow: 0 1px 4px rgba(31,58,70,0.08);
}
footer button:focus-visible, .swap:focus-visible, .expand-btn:focus-visible {
  outline: 2px solid var(--teal); outline-offset: 2px;
}

dialog {
  background: var(--card); color: var(--ink); border: none; border-radius: 22px;
  padding: 22px; width: min(92vw, 420px); margin: auto;
  box-shadow: 0 12px 40px rgba(31,58,70,0.18);
}
dialog::backdrop { background: rgba(31,58,70,0.35); }
dialog h2 { font-size: 16px; margin-bottom: 4px; }
dialog .hint { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
.setting-row { display: flex; align-items: center; justify-content: space-between;
               padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
.setting-row:last-of-type { border-bottom: none; }
.setting-row .controls { display: flex; gap: 8px; }
.setting-row button {
  background: #F2F8FA; border: none; color: var(--muted); border-radius: 9px;
  padding: 6px 11px; font-size: 12px; cursor: pointer; font-family: var(--sans); font-weight: 600;
}
.setting-row button.active { color: var(--teal); background: var(--teal-soft); }
.ph-status { font-size: 11.5px; color: var(--faint); margin-top: 13px; line-height: 1.6; }
.close-btn { margin-top: 15px; width: 100%; background: var(--teal); color: #fff; border: none;
             border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700;
             cursor: pointer; font-family: var(--sans); }
</style>
</head>
<body>

<header>

      ...pattern(15,[0,30]), ...pattern(16,[0,30]), ...pattern(17,[0,30]),
      ...pattern(18,[0,30]), ...pattern(19,[0,30]), ...pattern(20,[0,30]),
      ...pattern(21,[0,30]), ...pattern(22,[0,30]), ...pattern(23,[10,50]),
    ],
    sunPh: [
      ...pattern(0,[30]), ...pattern(1,[0]),
      ...pattern(6,[30]), ...pattern(7,[10,50]), ...pattern(8,[30]),
      ...pattern(9,[0,30]), ...pattern(10,[0,30]), ...pattern(11,[0,30]),
      ...pattern(12,[0,30]), ...pattern(13,[0,30]), ...pattern(14,[0,30]),
      ...pattern(15,[0,30]), ...pattern(16,[0,30]), ...pattern(17,[0,30]),
      ...pattern(18,[0,30]), ...pattern(19,[0,30]), ...pattern(20,[0,30]),
      ...pattern(21,[0,30]), ...pattern(22,[0,30]), ...pattern(23,[10,50]),
    ],
  },
};

// Route pairs: one card each, with a direction swap.
const PAIRS = [
  { id: "c4",    name: "C4 Bus",     icon: "🚌", dirs: ["C4-toDBN", "C4-toCL"] },
  { id: "03r",   name: "DB03R Bus",  icon: "🚌", dirs: ["03R-toSB", "03R-toDB"] },
  { id: "ferry", name: "Ferry",      icon: "⛴️", dirs: ["FERRY-toCEN", "FERRY-toDB"] },
];

// ---------- public holidays ----------
const HOLIDAYS_BUNDLED = [
  "20260101","20260217","20260218","20260219","20260403","20260404",
  "20260406","20260407","20260501","20260525","20260619","20260701",
  "20260926","20261001","20261019","20261225","20261226",
  "20270101","20270206","20270208","20270209","20270326","20270327",
  "20270329","20270405","20270501","20270513","20270609","20270701",
  "20270916","20271001","20271008","20271225","20271227",
];
const PH_URL = "https://www.1823.gov.hk/common/ical/en.json";
const PH_KEY = "expressdb.ph";
const PH_TTL = 7 * 24 * 60 * 60 * 1000;
let holidaySet = new Set(HOLIDAYS_BUNDLED);
let phSource = "bundled list";

function loadHolidayCache() {
  try {
    const cache = JSON.parse(localStorage.getItem(PH_KEY));
    if (cache && Array.isArray(cache.dates) && cache.dates.length) {
      cache.dates.forEach(d => holidaySet.add(d));
      phSource = "1823 live feed (cached " + new Date(cache.fetchedAt).toLocaleDateString() + ")";
      return cache;
    }
  } catch (e) {}
  return null;
}
async function refreshHolidays() {
  const cache = loadHolidayCache();
  const age = cache ? Date.now() - (cache.fetchedAt || 0) : Infinity;
  if (age <= PH_TTL) { updatePhStatus(); return; }
  try {
    const res = await fetch(PH_URL, { mode: "cors" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const dates = data.vcalendar[0].vevent.map(e => e.dtstart[0]);
    dates.forEach(d => holidaySet.add(d));
    localStorage.setItem(PH_KEY, JSON.stringify({ fetchedAt: Date.now(), dates }));
    phSource = "1823 live feed (updated today)";
  } catch (e) { /* bundled data keeps working */ }
  updatePhStatus();
}

// ---------- day-type + marker logic ----------
function ymd(d) {
  return d.getFullYear() + String(d.getMonth()+1).padStart(2,"0") + String(d.getDate()).padStart(2,"0");
}
function sheetFor(d) {
  if (holidaySet.has(ymd(d))) return "sunPh";
  const dow = d.getDay();
  return dow === 0 ? "sunPh" : dow === 6 ? "saturday" : "weekday";
}
function markerApplies(marker, d) {
  if (!marker) return true;
  const dow = d.getDay();
  const yest = new Date(d); yest.setDate(yest.getDate() - 1);
  const yestPH = holidaySet.has(ymd(yest));
  if (marker === "*") return dow === 0 || dow === 1 || yestPH;
  if (marker === "^") return !yestPH && dow >= 2 && dow <= 6;
  return false;
}
function toMin(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function fmt(min) { return String(Math.floor(min/60)).padStart(2,"0") + ":" + String(min%60).padStart(2,"0"); }
function dayDepartures(routeId, d) {
  return TIMETABLES[routeId][sheetFor(d)]
    .filter(e => markerApplies(e.marker, d)).map(e => toMin(e.time));
}
function nextInfo(routeId, now) {
  const nowMin = now.getHours()*60 + now.getMinutes();
  const all = dayDepartures(routeId, now);
  const upcoming = all.filter(m => m >= nowMin);
  if (upcoming.length) return { when: "today", deps: upcoming, all, nowMin };
  const tmr = new Date(now); tmr.setDate(tmr.getDate()+1);
  return { when: "tomorrow", deps: dayDepartures(routeId, tmr).slice(0,1), all, nowMin };
}

// ---------- preferences ----------
const PREF_KEY = "expressdb.prefs.v2";
let prefs;
function loadPrefs() {
  try { prefs = JSON.parse(localStorage.getItem(PREF_KEY)) || {}; } catch (e) { prefs = {}; }
  PAIRS.forEach(p => {
    if (!prefs[p.id]) prefs[p.id] = { visible: true, pinned: false, dirIndex: 0 };
    // Always open showing the outbound-from-DB direction; ⇄ swaps last
    // for the session only.
    prefs[p.id].dirIndex = 0;
  });
}
function savePrefs() { localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }
function orderedPairs() {
  const vis = PAIRS.filter(p => prefs[p.id].visible);
  return [...vis.filter(p => prefs[p.id].pinned), ...vis.filter(p => !prefs[p.id].pinned)];
}

// ---------- rendering ----------
const RED_MAX = 3, AMBER_MAX = 8;
function colorFor(mins) {
  return mins <= RED_MAX ? "var(--red)" : mins <= AMBER_MAX ? "var(--amber)" : "var(--green)";
}

const cardsEl = document.getElementById("cards");
const cardRefs = {};   // pairId -> { root, dirLabel, depTime, countdown, then, done, expandBtn, sched, schedList, lastKey }
const openCards = new Set();

function buildCards() {
  cardsEl.innerHTML = "";
  Object.keys(cardRefs).forEach(k => delete cardRefs[k]);
  orderedPairs().forEach(pair => {
    const card = document.createElement("article");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <span class="pair-name">${pair.icon} ${pair.name}${prefs[pair.id].pinned ? '<span class="pin">★</span>' : ''}</span>
        <button class="swap" aria-label="Switch direction">⇄</button>
      </div>
      <div class="dir-label"></div>
      <div class="board"><span class="dep-time">--:--</span><span class="countdown"></span></div>
      <div class="then"></div>
      <div class="done-note" style="display:none"></div>
      <button class="expand-btn">Full schedule</button>
      <div class="sched">
        <div class="sched-title">Today's remaining + full list</div>
        <div class="sched-list"></div>
      </div>`;
    const refs = {
      root: card,
      dirLabel: card.querySelector(".dir-label"),
      board: card.querySelector(".board"),
      depTime: card.querySelector(".dep-time"),
      countdown: card.querySelector(".countdown"),
      then: card.querySelector(".then"),
      done: card.querySelector(".done-note"),
      expandBtn: card.querySelector(".expand-btn"),
      schedList: card.querySelector(".sched-list"),
      lastKey: "",
    };
    card.querySelector(".swap").addEventListener("click", () => {
      prefs[pair.id].dirIndex = 1 - prefs[pair.id].dirIndex;
      savePrefs();
      refs.lastKey = "";           // force full refresh incl. schedule list
      tick(true);
      if (openCards.has(pair.id)) scrollScheduleToNow(pair.id, true);
    });
    refs.expandBtn.addEventListener("click", () => {
      if (openCards.has(pair.id)) { openCards.delete(pair.id); card.classList.remove("open");
        refs.expandBtn.textContent = "Full schedule"; return; }
      openCards.add(pair.id); card.classList.add("open");
      refs.expandBtn.textContent = "Hide schedule";
      buildSchedule(pair.id);
      scrollScheduleToNow(pair.id, true);
    });
    cardsEl.appendChild(card);
    cardRefs[pair.id] = refs;
  });
}

function buildSchedule(pairId) {
  const pair = PAIRS.find(p => p.id === pairId);
  const refs = cardRefs[pairId];
  const routeId = pair.dirs[prefs[pairId].dirIndex];
  const now = new Date();
  const info = nextInfo(routeId, now);
  const nextMin = info.when === "today" ? info.deps[0] : null;
  refs.schedList.innerHTML = info.all.map(m => {
    const cls = m === nextMin ? "srow next" : (m < info.nowMin ? "srow past" : "srow");
    const away = m >= info.nowMin ? `${m - info.nowMin}m` : "";
    return `<div class="${cls}" data-min="${m}"><span>${fmt(m)}</span><span class="away">${away}</span></div>`;
  }).join("") || '<div class="srow past"><span>No sailings today</span></div>';
}

function scrollScheduleToNow(pairId, smooth) {
  const refs = cardRefs[pairId];
  const target = refs.schedList.querySelector(".srow.next") ||
                 refs.schedList.querySelector(".srow:last-child");
  if (!target) return;
  const container = refs.schedList;
  const top = target.offsetTop - container.clientHeight / 2 + target.clientHeight / 2;
  container.scrollTo({ top: Math.max(0, top), behavior: smooth ? "smooth" : "auto" });
}

function tick(force) {
  const now = new Date();
  const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
  document.getElementById("clock").textContent =
    [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,"0")).join(":");
  const sheet = sheetFor(now);
  document.getElementById("daychip").textContent =
    now.toLocaleDateString("en-GB", { weekday: "short" }).toUpperCase() + " · " +
    (sheet === "sunPh" ? (now.getDay() !== 0 ? "HOLIDAY" : "SUN / PH")
     : sheet === "saturday" ? "SATURDAY" : "WEEKDAY");

  orderedPairs().forEach(pair => {
    const refs = cardRefs[pair.id];
    if (!refs) return;
    const routeId = pair.dirs[prefs[pair.id].dirIndex];
    const route = TIMETABLES[routeId];
    const info = nextInfo(routeId, now);
    refs.dirLabel.textContent = route.label;

    if (info.when === "today") {
      const next = info.deps[0];
      const minsAway = next - Math.floor(nowSec/60);
      const secsLeft = Math.max(0, next*60 - nowSec);
      refs.board.style.display = "";
      refs.done.style.display = "none";
      refs.depTime.textContent = fmt(next);
      refs.depTime.style.color = minsAway <= AMBER_MAX ? colorFor(minsAway) : "var(--ink)";
      refs.countdown.textContent = secsLeft === 0 ? "due now"
        : "in " + Math.floor(secsLeft/60) + ":" + String(secsLeft%60).padStart(2,"0");
      refs.countdown.style.color = colorFor(minsAway);
      refs.then.textContent = "";
      const upcoming = info.deps.slice(1,3).map(fmt);
      refs.then.innerHTML = upcoming.length
        ? `<b>then</b>  ${upcoming.join("  ·  ")}` : `<b>last one today</b>`;
      // refresh schedule list only when the next departure changes
      const key = routeId + ":" + next;
      if (openCards.has(pair.id) && (key !== refs.lastKey || force)) {
        buildSchedule(pair.id);
      }
      refs.lastKey = key;
    } else {
      refs.board.style.display = "none";
      refs.done.style.display = "";
      refs.done.innerHTML = `Done for today <span>· first tomorrow ${info.deps.length ? fmt(info.deps[0]) : "—"}</span>`;
      const key = routeId + ":done";
      if (openCards.has(pair.id) && (key !== refs.lastKey || force)) buildSchedule(pair.id);
      refs.lastKey = key;
    }
  });
}

// ---------- settings ----------
const dlg = document.getElementById("settingsDlg");
document.getElementById("settingsBtn").addEventListener("click", () => { buildSettings(); dlg.showModal(); });
document.getElementById("closeSettings").addEventListener("click", () => dlg.close());
dlg.addEventListener("close", () => { buildCards(); tick(true); openCards.clear(); });

function buildSettings() {
  const wrap = document.getElementById("settingRows");
  wrap.innerHTML = "";
  PAIRS.forEach(p => {
    const row = document.createElement("div");
    row.className = "setting-row";
    row.innerHTML = `<span>${p.icon} ${p.name}</span>
      <span class="controls">
        <button data-act="pin" class="${prefs[p.id].pinned ? "active" : ""}">★ Pin</button>
        <button data-act="vis" class="${prefs[p.id].visible ? "active" : ""}">${prefs[p.id].visible ? "Shown" : "Hidden"}</button>
      </span>`;
    row.querySelector('[data-act="pin"]').addEventListener("click", () => {
      prefs[p.id].pinned = !prefs[p.id].pinned; savePrefs(); buildSettings();
    });
    row.querySelector('[data-act="vis"]').addEventListener("click", () => {
      prefs[p.id].visible = !prefs[p.id].visible; savePrefs(); buildSettings();
    });
    wrap.appendChild(row);
  });
  updatePhStatus();
}
function updatePhStatus() {
  const el = document.getElementById("phStatus");
  if (el) el.textContent = "Public holidays: " + phSource +
    ". Bundled gazetted dates cover 2026–2027 fully offline. Ferry Sunday times apply on public holidays too.";
}

// ---------- boot ----------
loadPrefs();
loadHolidayCache();
buildCards();
tick(true);
setInterval(() => tick(false), 1000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(true); });
refreshHolidays();
</script>
</body>
</html>
